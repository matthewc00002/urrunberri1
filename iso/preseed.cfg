# =============================================================================
#  UrrunBerri OS — Debian 13 Preseed Configuration
#  Openema SARL — Mathieu Cadi
#
#  This preseed automates the Debian 13 (Trixie) installation.
#  The installer will ONLY ask for:
#    - Language / locale
#    - Hostname
#    - IP address / netmask / gateway / DNS
#    - Root password
#
#  Everything else is automated.
# =============================================================================

# ── LOCALE & KEYBOARD ────────────────────────────────────────────────────────
# Language is NOT preseeded — the installer will ask
d-i keyboard-configuration/xkb-keymap select fr

# ── NETWORK ───────────────────────────────────────────────────────────────────
# Network is NOT preseeded — the installer will ask for static IP config
# But we disable DHCP so it goes straight to manual config
d-i netcfg/disable_autoconfig boolean true
d-i netcfg/get_domain string openema.local

# ── MIRROR ────────────────────────────────────────────────────────────────────
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string
d-i mirror/suite string trixie

# ── CLOCK & TIMEZONE ──────────────────────────────────────────────────────────
d-i clock-setup/utc boolean true
d-i time/zone string Europe/Paris
d-i clock-setup/ntp boolean true

# ── ROOT ACCOUNT ──────────────────────────────────────────────────────────────
# Root password is NOT preseeded — the installer will ask
d-i passwd/root-login boolean true

# ── USER ACCOUNT (matt) ──────────────────────────────────────────────────────
d-i passwd/make-user boolean true
d-i passwd/user-fullname string Mathieu Cadi
d-i passwd/username string matt
d-i passwd/user-password-again password openema
d-i passwd/user-password password openema

# ── PARTITIONING ──────────────────────────────────────────────────────────────
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true

# ── BASE SYSTEM ───────────────────────────────────────────────────────────────
d-i base-installer/install-recommends boolean false

# ── APT ───────────────────────────────────────────────────────────────────────
d-i apt-setup/non-free-firmware boolean true
d-i apt-setup/contrib boolean true
d-i apt-setup/non-free boolean true
d-i apt-setup/use_mirror boolean true
d-i apt-setup/services-select multiselect security, updates

# ── PACKAGE SELECTION ─────────────────────────────────────────────────────────
tasksel tasksel/first multiselect ssh-server
d-i pkgsel/include string curl ca-certificates openssh-server sudo
d-i pkgsel/upgrade select full-upgrade
popularity-contest popularity-contest/participate boolean false

# ── GRUB ──────────────────────────────────────────────────────────────────────
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default
d-i grub-installer/with_other_os boolean false

# ── FINISH ────────────────────────────────────────────────────────────────────
d-i finish-install/reboot_in_progress note
d-i debian-installer/exit/halt boolean false

# ── POST-INSTALL (LATE COMMAND) ───────────────────────────────────────────────
# Create first-boot service that installs UrrunBerri OS on first startup
d-i preseed/late_command string \
    echo '#!/bin/bash' > /target/root/urrunberri-firstboot.sh; \
    echo '# UrrunBerri OS — First Boot Installer' >> /target/root/urrunberri-firstboot.sh; \
    echo 'exec > /root/urrunberri-firstboot.log 2>&1' >> /target/root/urrunberri-firstboot.sh; \
    echo 'echo "[UrrunBerri OS] First boot — installing..."' >> /target/root/urrunberri-firstboot.sh; \
    echo 'sleep 5' >> /target/root/urrunberri-firstboot.sh; \
    echo 'curl -fsSL https://raw.githubusercontent.com/matthewc00002/urrunberri1/test/scripts/install.sh | bash' >> /target/root/urrunberri-firstboot.sh; \
    echo 'systemctl disable urrunberri-firstboot.service' >> /target/root/urrunberri-firstboot.sh; \
    echo 'rm -f /root/urrunberri-firstboot.sh' >> /target/root/urrunberri-firstboot.sh; \
    echo 'reboot' >> /target/root/urrunberri-firstboot.sh; \
    chmod +x /target/root/urrunberri-firstboot.sh; \
    echo '[Unit]' > /target/etc/systemd/system/urrunberri-firstboot.service; \
    echo 'Description=UrrunBerri OS First Boot Installer' >> /target/etc/systemd/system/urrunberri-firstboot.service; \
    echo 'After=network-online.target' >> /target/etc/systemd/system/urrunberri-firstboot.service; \
    echo 'Wants=network-online.target' >> /target/etc/systemd/system/urrunberri-firstboot.service; \
    echo '' >> /target/etc/systemd/system/urrunberri-firstboot.service; \
    echo '[Service]' >> /target/etc/systemd/system/urrunberri-firstboot.service; \
    echo 'Type=oneshot' >> /target/etc/systemd/system/urrunberri-firstboot.service; \
    echo 'ExecStart=/root/urrunberri-firstboot.sh' >> /target/etc/systemd/system/urrunberri-firstboot.service; \
    echo 'RemainAfterExit=yes' >> /target/etc/systemd/system/urrunberri-firstboot.service; \
    echo '' >> /target/etc/systemd/system/urrunberri-firstboot.service; \
    echo '[Install]' >> /target/etc/systemd/system/urrunberri-firstboot.service; \
    echo 'WantedBy=multi-user.target' >> /target/etc/systemd/system/urrunberri-firstboot.service; \
    in-target systemctl enable urrunberri-firstboot.service; \
    in-target sed -i 's/^#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config; \
    in-target sed -i 's/^PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
