# UrrunBerri OS — Preseed Debian 13 Trixie
# Openema SARL — Mathieu Cadi

# Langue et localisation
d-i debian-installer/locale string fr_FR
d-i debian-installer/language string fr
d-i debian-installer/country string FR
d-i debian-installer/locale string fr_FR.UTF-8
d-i keyboard-configuration/xkb-keymap select fr

# Réseau — DHCP par défaut (sera remplacé par le script si IP statique)
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string urrunberri
d-i netcfg/get_domain string

# Désactiver la question de confirmation du nom d'hôte
d-i netcfg/hostname string urrunberri

# Miroir
d-i mirror/country string FR
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# Horloge
d-i clock-setup/utc boolean true
d-i time/zone string Europe/Paris
d-i clock-setup/ntp boolean true

# Partitionnement automatique — disque entier
d-i partman-auto/method string regular
d-i partman-auto/disk string /dev/sda
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true
d-i partman-md/confirm boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true

# Mot de passe root — sera remplacé par le script
d-i passwd/root-login boolean true
d-i passwd/root-password password ROOTPASS
d-i passwd/root-password-again password ROOTPASS

# Utilisateur — sera remplacé par le script
d-i passwd/make-user boolean true
d-i passwd/user-fullname string Utilisateur
d-i passwd/username string USERNAME
d-i passwd/user-password password USERPASS
d-i passwd/user-password-again password USERPASS

# Sélection des paquets — minimal avec SSH uniquement
d-i tasksel/first multiselect
d-i pkgsel/include string openssh-server
d-i pkgsel/upgrade select full-upgrade
d-i pkgsel/update-policy select none
popularity-contest popularity-contest/participate boolean false

# GRUB
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string /dev/sda

# Fin — lancer le script UrrunBerri OS
d-i preseed/late_command string \
    in-target sed -i 's/#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config; \
    in-target bash -c 'echo "curl -fsSL https://raw.githubusercontent.com/matthewc00002/urrunberri1/main/scripts/install.sh | bash && reboot" >> /root/install_urrunberri.sh'; \
    in-target chmod +x /root/install_urrunberri.sh; \
    in-target bash -c 'echo "@reboot root /root/install_urrunberri.sh >> /var/log/urrunberri_install.log 2>&1" >> /etc/cron.d/urrunberri'; \
    in-target chmod 644 /etc/cron.d/urrunberri

d-i finish-install/reboot_in_progress note
